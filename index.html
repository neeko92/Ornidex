<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3B6D11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ornidex">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>Ornidex — Oiseaux de France</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eee;--tx:#1a1a1a;--tx2:#555;--tx3:#999;--bd:rgba(0,0,0,.11);--bd2:rgba(0,0,0,.2);--r:10px;--rl:14px;--g:#3B6D11;--gbg:#EAF3DE;--gbd:#C0DD97;--bbg:#E6F1FB;--bbd:#B5D4F4;--btx:#185FA5}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;--bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2)}}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;flex-shrink:0;border-right:.5px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
@media(max-width:680px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:.5px solid var(--bd)}
  .sidebar.collapsed{height:44px;overflow:hidden}
}
.sb-head{padding:.65rem 1rem;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.logo i{color:var(--g)}
.sb-toggle{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--tx2);font-size:18px;display:none;align-items:center}
@media(max-width:680px){.sb-toggle{display:flex}}
.sb-body{flex:1;overflow-y:auto;padding:.4rem 0}
.sb-sec-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:.4rem 1rem .2rem}
.sbi{display:flex;align-items:center;gap:6px;padding:.32rem 1rem;font-size:12px;cursor:pointer;color:var(--tx2);transition:background .1s;user-select:none}
.sbi:hover{background:var(--bg3);color:var(--tx)}
.sbi.active{background:var(--gbg);color:var(--g);font-weight:600}
.sbi i{font-size:13px;flex-shrink:0}
.sbi .caret{margin-left:auto;font-size:11px;transition:transform .2s;flex-shrink:0}
.sbi.open .caret{transform:rotate(90deg)}
.sb-sub{display:none}
.sb-sub.open{display:block}
.sbc{margin-left:auto;font-size:10px;background:var(--bg3);padding:1px 5px;border-radius:8px;color:var(--tx3);flex-shrink:0}
.sbi.active .sbc{background:rgba(59,109,17,.15)}
.sbi.i1{padding-left:1.6rem}
.main-head{padding:.55rem 1rem;border-bottom:.5px solid var(--bd);display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
.stats{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;border:.5px solid var(--bd);color:var(--tx2);background:var(--bg2);white-space:nowrap}
.pill.s{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.pill.h{background:var(--bbg);color:var(--btx);border-color:var(--bbd)}
.hact{margin-left:auto;display:flex;gap:5px}
.ibtn{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);width:31px;height:31px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:15px;position:relative;flex-shrink:0}
.ibtn:hover{background:var(--bg3)}
.ibtn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.toolbar{padding:.45rem 1rem;border-bottom:.5px solid var(--bd);display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:130px}
.sw i{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx3);pointer-events:none}
.sw input{width:100%;padding:6px 8px 6px 28px;font-size:12px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none}
.sw input:focus{border-color:#378ADD}
.sort-sel{font-size:12px;padding:6px 8px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none;cursor:pointer}
.gw{flex:1;overflow-y:auto;padding:.65rem 1rem 3rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.card:hover{border-color:var(--bd2);transform:translateY(-1px)}
.card.cs{border-color:#97C459}
.card.ch{border-color:#85B7EB}
.card.cb{border-color:#97C459;box-shadow:inset 3px 0 0 #85B7EB}
.cimg{width:100%;aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.cimg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .3s}
.cimg img.loaded{opacity:1}
.cimg .ph{font-size:24px;opacity:.18}
.ci{padding:6px}
.cn{font-size:11px;font-weight:600;line-height:1.3}
.cl{font-size:9px;color:var(--tx3);font-style:italic;margin-top:1px;line-height:1.2}
.cbdg{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap}
.bdg{font-size:8px;padding:1px 4px;border-radius:3px;display:flex;align-items:center;gap:1px}
.bdg.s{background:var(--gbg);color:var(--g)}
.bdg.h{background:var(--bbg);color:var(--btx)}
.empty{text-align:center;padding:3rem;color:var(--tx3);font-size:13px}
.pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:.65rem;font-size:12px;color:var(--tx2);flex-shrink:0;border-top:.5px solid var(--bd)}
.pager button{font-size:12px;padding:5px 12px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);cursor:pointer}
.pager button:hover:not(:disabled){background:var(--bg2)}
.pager button:disabled{opacity:.3;cursor:default}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.ov{align-items:center;padding:1rem}}
.det{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:500px;max-height:93vh;overflow-y:auto;display:flex;flex-direction:column}
@media(min-width:600px){.det{border-radius:var(--rl);max-height:88vh}}
.dim{width:100%;height:190px;background:var(--bg2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dim img{width:100%;height:100%;object-fit:cover}
.dim .dph{font-size:48px;opacity:.18}
.dbd{padding:1rem;display:flex;flex-direction:column;gap:.65rem}
.dhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dtitle h3{font-size:17px;font-weight:700;line-height:1.2}
.dtitle p{font-size:11px;color:var(--tx3);font-style:italic;margin-top:2px}
.cbtn{background:var(--bg2);border:.5px solid var(--bd);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;color:var(--tx)}
.dtags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--tx2);border:.5px solid var(--bd)}
.dwiki{font-size:12px;color:var(--tx2);line-height:1.6;background:var(--bg2);border-radius:var(--r);padding:.7rem;min-height:50px}
.dwiki.loading{color:var(--tx3);font-style:italic}
.dsound{background:var(--bg2);border-radius:var(--r);padding:.6rem .75rem}
.dst{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:.4rem;display:flex;align-items:center;gap:5px}
.dsound audio{width:100%;height:34px}
.dsi{font-size:9px;color:var(--tx3);margin-top:.3rem}
.dsl{font-size:11px;color:var(--tx3);font-style:italic}
.obs-sec{border-top:.5px solid var(--bd);padding-top:.75rem}
.obs-tit{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem}
.orow{display:flex;flex-direction:column;gap:6px;margin-bottom:.6rem}
.och{display:flex;align-items:center;gap:8px}
.och label{font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;cursor:pointer}
.och input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--g)}
.ofields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;padding-left:24px}
@media(max-width:380px){.ofields{grid-template-columns:1fr 1fr}}
.ofields label{font-size:10px;color:var(--tx3);display:block;margin-bottom:2px}
.ofields input{font-size:11px;padding:5px 7px;width:100%;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);outline:none}
.ofields input:focus{border-color:#378ADD}
.geo-btn{font-size:11px;padding:4px 9px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;margin-top:3px}
.savebtn{width:100%;padding:9px;font-size:13px;font-weight:600;background:var(--g);color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.savebtn:hover{opacity:.9}
.savedmsg{text-align:center;font-size:11px;color:var(--g);height:14px}
.elink{display:block;text-align:center;font-size:11px;color:var(--tx3);text-decoration:none;padding:.4rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.install-bar{background:var(--gbg);border:.5px solid var(--gbd);border-radius:var(--r);padding:.55rem .85rem;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g);margin:.45rem 1rem 0;flex-shrink:0}
.install-bar .inst{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--g);color:#fff;border:none;cursor:pointer;flex-shrink:0}
.install-bar .cls{background:none;border:none;color:var(--g);cursor:pointer;font-size:15px;margin-left:auto;padding:0 2px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="logo"><i class="ti ti-feather"></i> Ornidex</div>
      <button class="sb-toggle" id="sbt" aria-label="Replier"><i class="ti ti-chevron-up"></i></button>
    </div>
    <div class="sb-body" id="sb-body">
      <div class="sb-sec-title">Statut</div>
      <div class="sbi active" data-f="all"><i class="ti ti-list"></i> Tous <span class="sbc" id="cnt-all">…</span></div>
      <div class="sbi" data-f="seen"><i class="ti ti-eye" style="color:#3B6D11"></i> Observés <span class="sbc" id="cnt-seen">0</span></div>
      <div class="sbi" data-f="heard"><i class="ti ti-ear" style="color:#185FA5"></i> Entendus <span class="sbc" id="cnt-heard">0</span></div>
      <div class="sbi" data-f="unseen"><i class="ti ti-eye-off" style="color:#993C1D"></i> Non rencontrés <span class="sbc" id="cnt-unseen">…</span></div>
      <div class="sb-sec-title" style="margin-top:.5rem">Taxonomie</div>
      <div id="taxo-tree"></div>
    </div>
  </div>
  <div class="main">
    <div id="ibar"></div>
    <div class="main-head">
      <div class="stats">
        <span class="pill s" id="st-s">0 obs.</span>
        <span class="pill h" id="st-h">0 entendus</span>
        <span class="pill" id="st-t">630 espèces</span>
      </div>
      <div class="hact">
        <button class="ibtn" id="btn-exp" title="Exporter"><i class="ti ti-download"></i></button>
        <div class="ibtn" title="Importer"><i class="ti ti-upload"></i><input type="file" accept=".json" id="imp-file"></div>
      </div>
    </div>
    <div class="toolbar">
      <div class="sw"><i class="ti ti-search"></i><input type="text" id="search" placeholder="Nom, famille, ordre…" autocomplete="off"></div>
      <select class="sort-sel" id="sort-sel">
        <option value="name">A–Z</option>
        <option value="name-desc">Z–A</option>
        <option value="family">Famille</option>
        <option value="order">Ordre</option>
        <option value="seen">Observés d'abord</option>
      </select>
    </div>
    <div class="gw" id="gw"><div class="grid" id="grid"><div class="empty">Chargement…</div></div></div>
    <div class="pager" id="pager" style="display:none">
      <button id="prev"><i class="ti ti-arrow-left"></i></button>
      <span id="pinfo"></span>
      <button id="next"><i class="ti ti-arrow-right"></i></button>
    </div>
  </div>
</div>
<div class="ov" id="ov" style="display:none"><div class="det" id="dpanel"></div></div>
<div class="toast" id="toast"></div>

const PAGE=80;
let obs={},filter='all',q='',sort='name',page=0,imgCache={},wikiCache={},xenoCache={},deferredPrompt=null;

function loadObs(){try{const d=localStorage.getItem('ornidex_obs_v4');if(d)obs=JSON.parse(d);}catch(e){}}
function saveObs(){try{localStorage.setItem('ornidex_obs_v4',JSON.stringify(obs));}catch(e){}}
function loadImgCache(){try{const d=localStorage.getItem('ornidex_img');if(d)imgCache=JSON.parse(d);}catch(e){}}
function saveImgCache(){try{localStorage.setItem('ornidex_img',JSON.stringify(imgCache));}catch(e){}}

async function getPhoto(b){
  if(imgCache[b.id]!==undefined)return imgCache[b.id];
  imgCache[b.id]=null;
  try{
    const r=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(b.name)}&per_page=1&rank=species&locale=fr`);
    const d=await r.json();
    const url=d?.results?.[0]?.default_photo?.medium_url||null;
    imgCache[b.id]=url;return url;
  }catch(e){return null;}
}

async function getWiki(b){
  if(wikiCache[b.id])return wikiCache[b.id];
  const try1=async(t)=>{const r=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`);if(!r.ok)throw 0;const d=await r.json();return d.extract||null;};
  try{const t=await try1(b.name);if(t){wikiCache[b.id]=t;return t;}}catch(e){}
  wikiCache[b.id]='Aucune description disponible.';
  return wikiCache[b.id];
}

async function getXeno(b){
  if(xenoCache[b.id]!==undefined)return xenoCache[b.id];
  xenoCache[b.id]=null;
  try{
    const r=await fetch(`https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(b.name)}+q:A&page=1`);
    const d=await r.json();
    const rec=d?.recordings?.[0];
    if(!rec)return null;
    const res={url:`https:${rec.file}`,author:rec.rec,date:rec.date,location:rec.loc,type:rec.type,id:rec.id};
    xenoCache[b.id]=res;return res;
  }catch(e){return null;}
}

function buildTaxo(){
  const tree={};
  BIRDS.forEach(b=>{
    if(!tree[b.order])tree[b.order]={fams:new Set(),count:0};
    tree[b.order].fams.add(b.family);
    tree[b.order].count++;
  });
  const c=document.getElementById('taxo-tree');c.innerHTML='';
  Object.keys(tree).sort().forEach(ord=>{
    const fams=[...tree[ord].fams].sort();
    const oel=document.createElement('div');
    oel.className='sbi';oel.dataset.f=`order:${ord}`;
    oel.innerHTML=`<i class="ti ti-chevron-right caret"></i><span style="flex:1;font-size:11px">${ord}</span><span class="sbc">${tree[ord].count}</span>`;
    c.appendChild(oel);
    const sub=document.createElement('div');sub.className='sb-sub';
    fams.forEach(fam=>{
      const cnt=BIRDS.filter(b=>b.family===fam).length;
      const fel=document.createElement('div');
      fel.className='sbi i1';fel.dataset.f=`family:${fam}`;
      fel.innerHTML=`<i class="ti ti-minus" style="font-size:9px;opacity:.4"></i><span style="flex:1;font-size:11px">${fam}</span><span class="sbc">${cnt}</span>`;
      sub.appendChild(fel);
      fel.addEventListener('click',()=>applyFilter(`family:${fam}`,fel));
    });
    c.appendChild(sub);
    oel.addEventListener('click',()=>{
      const open=sub.classList.contains('open');
      sub.classList.toggle('open',!open);oel.classList.toggle('open',!open);
      applyFilter(`order:${ord}`,oel);
    });
  });
}

function applyFilter(f,el){
  filter=f;page=0;
  document.querySelectorAll('.sbi').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  renderGrid();
}

function getFiltered(){
  const qq=q.toLowerCase();
  let list=BIRDS.filter(b=>{
    if(qq&&!b.name.toLowerCase().includes(qq)&&!b.family.toLowerCase().includes(qq)&&!b.order.toLowerCase().includes(qq))return false;
    if(filter==='seen')return obs[b.id]?.seen;
    if(filter==='heard')return obs[b.id]?.heard;
    if(filter==='unseen')return!obs[b.id]?.seen&&!obs[b.id]?.heard;
    if(filter.startsWith('order:'))return b.order===filter.slice(6);
    if(filter.startsWith('family:'))return b.family===filter.slice(7);
    return true;
  });
  list=[...list];
  if(sort==='name')list.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  else if(sort==='name-desc')list.sort((a,b)=>b.name.localeCompare(a.name,'fr'));
  else if(sort==='family')list.sort((a,b)=>a.family.localeCompare(b.family,'fr')||a.name.localeCompare(b.name,'fr'));
  else if(sort==='order')list.sort((a,b)=>a.order.localeCompare(b.order,'fr')||a.family.localeCompare(b.family,'fr')||a.name.localeCompare(b.name,'fr'));
  else if(sort==='seen')list.sort((a,b)=>{const as=(obs[a.id]?.seen||obs[a.id]?.heard)?1:0,bs=(obs[b.id]?.seen||obs[b.id]?.heard)?1:0;return bs-as||a.name.localeCompare(b.name,'fr');});
  return list;
}

function sc(id){const o=obs[id];if(!o)return'';if(o.seen&&o.heard)return'cb';if(o.seen)return'cs';if(o.heard)return'ch';return'';}

function renderStats(){
  const s=BIRDS.filter(b=>obs[b.id]?.seen).length;
  const h=BIRDS.filter(b=>obs[b.id]?.heard).length;
  document.getElementById('st-s').textContent=s+' obs.';
  document.getElementById('st-h').textContent=h+' entendus';
  document.getElementById('st-t').textContent=BIRDS.length+' espèces';
  document.getElementById('cnt-all').textContent=BIRDS.length;
  document.getElementById('cnt-seen').textContent=s;
  document.getElementById('cnt-heard').textContent=h;
  document.getElementById('cnt-unseen').textContent=BIRDS.length-BIRDS.filter(b=>obs[b.id]?.seen||obs[b.id]?.heard).length;
}

async function renderGrid(){
  const list=getFiltered(),total=list.length;
  const maxP=Math.max(0,Math.ceil(total/PAGE)-1);
  if(page>maxP)page=0;
  const slice=list.slice(page*PAGE,(page+1)*PAGE);
  const grid=document.getElementById('grid');
  if(!slice.length){grid.innerHTML='<div class="empty"><i class="ti ti-binoculars" style="font-size:26px;display:block;margin:0 auto .5rem;opacity:.3"></i>Aucun oiseau trouvé</div>';document.getElementById('pager').style.display='none';renderStats();return;}
  grid.innerHTML=slice.map(b=>{
    const o=obs[b.id]||{};
    const bdg=[];
    if(o.seen)bdg.push('<span class="bdg s"><i class="ti ti-eye"></i> Vu</span>');
    if(o.heard)bdg.push('<span class="bdg h"><i class="ti ti-ear"></i> Entendu</span>');
    const imgH=imgCache[b.id]?`<img src="${imgCache[b.id]}" alt="${b.name}" class="loaded">`:'<i class="ti ti-feather ph"></i>';
    return`<div class="card ${sc(b.id)}" data-id="${b.id}" role="button" tabindex="0" aria-label="${b.name}"><div class="cimg" id="img-${b.id}">${imgH}</div><div class="ci"><div class="cn">${b.name}</div><div class="cl">${b.family}</div>${bdg.length?'<div class="cbdg">'+bdg.join('')+'</div>':''}</div></div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(c=>{c.addEventListener('click',()=>openDetail(c.dataset.id));c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openDetail(c.dataset.id);});});
  const pager=document.getElementById('pager');
  if(total>PAGE){pager.style.display='flex';document.getElementById('pinfo').textContent=`Page ${page+1}/${maxP+1} — ${total} espèces`;document.getElementById('prev').disabled=page===0;document.getElementById('next').disabled=page===maxP;}
  else pager.style.display='none';
  renderStats();
  const toLoad=slice.filter(b=>imgCache[b.id]===undefined);
  const lb=async(bs)=>{for(const b of bs){const url=await getPhoto(b);const el=document.getElementById('img-'+b.id);if(url&&el){const img=document.createElement('img');img.src=url;img.alt=b.name;img.onload=()=>{img.classList.add('loaded');saveImgCache();};el.innerHTML='';el.appendChild(img);}}};
  for(let i=0;i<toLoad.length;i+=8){lb(toLoad.slice(i,i+8));await new Promise(r=>setTimeout(r,100));}
}

async function openDetail(id){
  const b=BIRDS.find(x=>x.id===id);if(!b)return;
  const o=obs[id]||{};
  const panel=document.getElementById('dpanel');
  const pu=imgCache[b.id]||await getPhoto(b);
  panel.innerHTML=`
    <div class="dim">${pu?`<img src="${pu}" alt="${b.name}">`:'<i class="ti ti-feather dph"></i>'}</div>
    <div class="dbd">
      <div class="dhead"><div class="dtitle"><h3>${b.name}</h3></div><button class="cbtn" id="cbtn" aria-label="Fermer"><i class="ti ti-x"></i></button></div>
      <div class="dtags"><span class="tag">${b.order}</span><span class="tag">${b.family}</span></div>
      <div class="dwiki loading" id="dwiki">Chargement…</div>

          <div class="och"><input type="checkbox" id="cbs" ${o.seen?'checked':''}><label for="cbs"><i class="ti ti-eye" style="color:#3B6D11"></i> Observé</label></div>
          <div class="ofields" id="sf" style="display:${o.seen?'grid':'none'}">
            <div><label>Date</label><input type="date" id="sd" value="${o.seenDate||''}"></div>
            <div><label>Lieu</label><input type="text" id="sp" placeholder="Gorges du Tarn" value="${o.seenPlace||''}"></div>
            <div><label>GPS</label><input type="text" id="sg" placeholder="lat, lon" value="${o.seenGps||''}"></div>
          </div>
          <button class="geo-btn" id="geo-s" style="display:${o.seen?'flex':'none'}"><i class="ti ti-map-pin" style="font-size:12px"></i> Position actuelle</button>
        </div>
        <div class="orow">
          <div class="och"><input type="checkbox" id="cbh" ${o.heard?'checked':''}><label for="cbh"><i class="ti ti-ear" style="color:#185FA5"></i> Entendu</label></div>
          <div class="ofields" id="hf" style="display:${o.heard?'grid':'none'}">
            <div><label>Date</label><input type="date" id="hd" value="${o.heardDate||''}"></div>
            <div><label>Lieu</label><input type="text" id="hp" placeholder="Forêt de Mercoire" value="${o.heardPlace||''}"></div>

          </div>
          <button class="geo-btn" id="geo-h" style="display:${o.heard?'flex':'none'}"><i class="ti ti-map-pin" style="font-size:12px"></i> Position actuelle</button>
        </div>
        <button class="savebtn" id="svbtn"><i class="ti ti-device-floppy"></i> Enregistrer</button>

      </div>
      <a class="elink" href="https://ebird.org/species/${b.id}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:10px;vertical-align:-1px"></i> Voir sur eBird</a>
    </div>`;
  document.getElementById('ov').style.display='flex';
  document.getElementById('cbtn').addEventListener('click',()=>document.getElementById('ov').style.display='none');
  const tog=(cbId,fId,gId)=>{document.getElementById(cbId).addEventListener('change',e=>{document.getElementById(fId).style.display=e.target.checked?'grid':'none';document.getElementById(gId).style.display=e.target.checked?'flex':'none';});};
  tog('cbs','sf','geo-s');tog('cbh','hf','geo-h');
  const geoFill=(inputId)=>{if(!navigator.geolocation){toast('Géolocalisation non disponible');return;}toast('Localisation…');navigator.geolocation.getCurrentPosition(p=>{const v=`${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;const el=document.getElementById(inputId);if(el)el.value=v;toast('Position ok !');},()=>toast('Position indisponible'));};
  document.getElementById('geo-s').addEventListener('click',()=>geoFill('sg'));
  document.getElementById('geo-h').addEventListener('click',()=>geoFill('hg'));
  document.getElementById('svbtn').addEventListener('click',()=>{
    obs[id]={seen:document.getElementById('cbs').checked,heard:document.getElementById('cbh').checked,seenDate:document.getElementById('sd').value,seenPlace:document.getElementById('sp').value,seenGps:document.getElementById('sg').value,heardDate:document.getElementById('hd').value,heardPlace:document.getElementById('hp').value,heardGps:document.getElementById('hg').value};
    saveObs();renderGrid();
    const m=document.getElementById('svmsg');if(m){m.textContent='Enregistré !';setTimeout(()=>{if(document.getElementById('svmsg'))document.getElementById('svmsg').textContent='';},2000);}
  });
  getWiki(b).then(t=>{const el=document.getElementById('dwiki');if(el){el.textContent=t;el.classList.remove('loading');}});

    const el=document.getElementById('dsound');if(!el)return;
    if(!rec){el.innerHTML='<div class="dst"><i class="ti ti-music" style="color:#185FA5"></i> Chant</div><div class="dsl">Aucun enregistrement</div>';return;}
    el.innerHTML=`<div class="dst"><i class="ti ti-music" style="color:#185FA5"></i> Chant</div><audio controls src="${rec.url}" preload="none" style="width:100%;height:34px"></audio><div class="dsi">${rec.author||''} ${rec.location?'· '+rec.location:''} ${rec.date?'· '+rec.date:''} ${rec.type?'· '+rec.type:''} · <a href="https://xeno-canto.org/${rec.id}" target="_blank" style="color:var(--btx)">Xeno-canto</a></div>`;
  });
}

document.getElementById('btn-exp').addEventListener('click',()=>{
  const d=JSON.stringify({version:4,exported:new Date().toISOString(),observations:obs},null,2);
  const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(d);a.download='ornidex-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Exporté !');
});
document.getElementById('imp-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.observations){obs={...obs,...d.observations};saveObs();renderGrid();toast('Importé !');}}catch{toast('Fichier invalide');}};r.readAsText(f);e.target.value='';
});
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))document.getElementById('ov').style.display='none';});
document.getElementById('search').addEventListener('input',e=>{q=e.target.value;page=0;renderGrid();});
document.getElementById('sort-sel').addEventListener('change',e=>{sort=e.target.value;page=0;renderGrid();});
document.getElementById('prev').addEventListener('click',()=>{page--;renderGrid();document.getElementById('gw').scrollTo(0,0);});
document.getElementById('next').addEventListener('click',()=>{page++;renderGrid();document.getElementById('gw').scrollTo(0,0);});
document.getElementById('sbt').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('collapsed'));
document.querySelectorAll('.sbi[data-f]').forEach(el=>{
  if(['all','seen','heard','unseen'].includes(el.dataset.f))el.addEventListener('click',()=>applyFilter(el.dataset.f,el));
});
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const bar=document.getElementById('ibar');
  bar.innerHTML='<div class="install-bar"><i class="ti ti-device-mobile" style="font-size:16px;flex-shrink:0"></i><span>Installer Ornidex comme app</span><button class="inst" id="ibtn">Installer</button><button class="cls" id="iclose"><i class="ti ti-x"></i></button></div>';
  document.getElementById('ibtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted')toast('Installé !');deferredPrompt=null;bar.innerHTML='';});
  document.getElementById('iclose').addEventListener('click',()=>bar.innerHTML='');
});
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

loadObs();loadImgCache();buildTaxo();renderGrid();
</script>
</body>
</html>
