<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3B6D11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ornidex">
<link rel="manifest" href="./manifest.json">

<title>Ornidex — Oiseaux de France</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeece8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --radius:10px;--radius-lg:14px;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-border:#C0DD97;--green-text:#3B6D11;
  --blue-bg:#E6F1FB;--blue-border:#B5D4F4;--blue-text:#185FA5;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.22);
}}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:.75rem 1rem 4rem}

/* Header */
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:.5rem 0 .75rem;border-bottom:.5px solid var(--border);margin-bottom:.75rem}
.logo{font-size:19px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--text)}
.logo i{color:var(--green)}
.stats{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:.5px solid var(--border);color:var(--text2);background:var(--bg2)}
.pill.s{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.pill.h{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.actions{margin-left:auto;display:flex;gap:6px}
.icon-btn{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:17px;position:relative}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.icon-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* Controls */
.controls{display:flex;gap:7px;padding:.5rem 0;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:150px}
.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.sw input{width:100%;padding:8px 10px 8px 32px;font-size:13px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
.sw input:focus{border-color:#378ADD}
.fbtns{display:flex;gap:3px;flex-wrap:wrap}
.fb{font-size:11px;padding:5px 10px;border-radius:20px;border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer}
.fb:hover{background:var(--bg2)}
.fb.active{background:var(--bg2);color:var(--text);font-weight:500}
.fb.active.fs{background:var(--green-bg);color:var(--green-text);border-color:#639922}
.fb.active.fh{background:var(--blue-bg);color:var(--blue-text);border-color:#378ADD}
.fb.active.fn{background:#FAECE7;color:#993C1D;border-color:#D85A30}

/* Grille */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;padding:.5rem 0}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.card:hover,.card:active{border-color:var(--border2);transform:translateY(-1px)}
.card.cs{border-color:#97C459}
.card.ch{border-color:#85B7EB}
.card.cb{border-color:#97C459;box-shadow:inset 3px 0 0 #85B7EB}
.cimg{width:100%;aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.cimg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .3s}
.cimg img.loaded{opacity:1}
.cimg .ph{font-size:28px;opacity:.2}
.ci{padding:7px}
.cn{font-size:11px;font-weight:600;line-height:1.3}
.cl{font-size:9px;color:var(--text3);font-style:italic;margin-top:1px}
.cbdg{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.bdg{font-size:9px;padding:2px 4px;border-radius:3px;display:flex;align-items:center;gap:2px}
.bdg.s{background:var(--green-bg);color:var(--green-text)}
.bdg.h{background:var(--blue-bg);color:var(--blue-text)}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;grid-column:1/-1}

/* Pager */
.pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:.75rem 0 1rem;font-size:13px;color:var(--text2)}
.pager button{font-size:13px;padding:7px 14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer}
.pager button:hover:not(:disabled){background:var(--bg2)}
.pager button:disabled{opacity:.3;cursor:default}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:600px){.overlay{align-items:center;padding:1rem}}
.detail{background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border-top:.5px solid var(--border2)}
@media(min-width:600px){.detail{border-radius:var(--radius-lg);max-height:88vh}}
.dimg{width:100%;height:190px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.dimg img{width:100%;height:100%;object-fit:cover}
.dimg .dph{font-size:48px;opacity:.2}
.dbody{padding:1.1rem}
.dhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.65rem}
.dtitle h3{font-size:17px;font-weight:700}
.dtitle p{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px}
.closebtn{background:var(--bg2);border:.5px solid var(--border);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;color:var(--text)}
.dtags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.65rem}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--text2);border:.5px solid var(--border)}
.obs{border-top:.5px solid var(--border);padding-top:.85rem}
.obstit{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:.65rem;text-transform:uppercase;letter-spacing:.07em}
.orow{display:flex;flex-direction:column;gap:7px;margin-bottom:.65rem}
.och{display:flex;align-items:center;gap:9px}
.och label{font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;cursor:pointer}
.och input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--green)}
.ofields{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:5px;padding-left:27px}
.ofields label{font-size:10px;color:var(--text3);display:block;margin-bottom:2px}
.ofields input{font-size:12px;padding:6px 8px;width:100%;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
.ofields input:focus{border-color:#378ADD}
.savebtn{width:100%;padding:10px;font-size:14px;font-weight:600;background:var(--green);color:white;border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:.75rem}
.savebtn:hover{opacity:.9}
.savedmsg{text-align:center;font-size:11px;color:var(--green);margin-top:5px;height:14px}
.elink{display:block;text-align:center;font-size:11px;color:var(--text3);margin-top:.5rem;text-decoration:none;padding:.5rem}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#222;color:white;font-size:13px;padding:10px 18px;border-radius:20px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* Install banner */
.install-bar{background:var(--green-bg);border:.5px solid var(--green-border);border-radius:var(--radius);padding:.65rem 1rem;display:flex;align-items:center;gap:10px;margin-bottom:.75rem;font-size:13px;color:var(--green-text)}
.install-bar button{margin-left:auto;font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid var(--green-text);background:var(--green);color:white;cursor:pointer;flex-shrink:0}
.install-bar .close-bar{background:none;border:none;color:var(--green-text);cursor:pointer;padding:2px 4px;font-size:16px;margin-left:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"><i class="ti ti-feather"></i> Ornidex</div>
    <div class="stats">
      <span class="pill s" id="st-s">0 obs.</span>
      <span class="pill h" id="st-h">0 entendus</span>
      <span class="pill" id="st-t">… espèces</span>
    </div>
    <div class="actions">
      <button class="icon-btn" id="btn-export" title="Exporter mes observations"><i class="ti ti-download"></i></button>
      <div class="icon-btn" title="Importer des observations">
        <i class="ti ti-upload"></i>
        <input type="file" accept=".json" id="import-file">
      </div>
    </div>
  </div>

  <div id="install-bar" class="install-bar" style="display:none">
    <i class="ti ti-device-mobile" style="font-size:18px;flex-shrink:0"></i>
    <span>Installe Ornidex comme une vraie app !</span>
    <button id="install-btn">Installer</button>
    <button class="close-bar" id="close-bar" aria-label="Fermer"><i class="ti ti-x"></i></button>
  </div>

  <div class="controls">
    <div class="sw"><i class="ti ti-search"></i><input type="text" id="search" placeholder="Nom, famille…" autocomplete="off"></div>
    <div class="fbtns">
      <button class="fb active" data-f="all">Tous</button>
      <button class="fb fs" data-f="seen">Observés</button>
      <button class="fb fh" data-f="heard">Entendus</button>
      <button class="fb fn" data-f="unseen">Non rencontrés</button>
    </div>
  </div>

  <div class="grid" id="grid"><div class="empty"><i class="ti ti-loader" style="font-size:28px;display:block;margin:0 auto .5rem;opacity:.3"></i>Chargement…</div></div>
  <div class="pager" id="pager" style="display:none">
    <button id="prev"><i class="ti ti-arrow-left"></i></button>
    <span id="pinfo"></span>
    <button id="next"><i class="ti ti-arrow-right"></i></button>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none"><div class="detail" id="dpanel"></div></div>
<div class="toast" id="toast"></div>

// --- Storage ---
function loadObs(){try{const d=localStorage.getItem('ornidex_obs');if(d)obs=JSON.parse(d);}catch(e){}}
function saveObs(){try{localStorage.setItem('ornidex_obs',JSON.stringify(obs));}catch(e){}}

// --- Photos iNaturalist ---
async function getPhoto(bird){
  if(imgCache[bird.id]!==undefined)return imgCache[bird.id];
  imgCache[bird.id]=null;
  try{
    const r=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(bird.latin)}&per_page=1&rank=species`);
    const d=await r.json();
    const url=d?.results?.[0]?.default_photo?.medium_url||null;
    imgCache[bird.id]=url;return url;
  }catch(e){return null;}
}

// --- UI ---
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function filtered(){
  const qq=q.toLowerCase();
  return allBirds.filter(b=>{
    if(qq&&!b.name.toLowerCase().includes(qq)&&!b.latin.toLowerCase().includes(qq)&&!b.family.toLowerCase().includes(qq))return false;
    const o=obs[b.id];
    if(filter==='seen')return o?.seen;
    if(filter==='heard')return o?.heard;
    if(filter==='unseen')return!o?.seen&&!o?.heard;
    return true;
  });
}
function sc(id){const o=obs[id];if(!o)return '';if(o.seen&&o.heard)return 'cb';if(o.seen)return 'cs';if(o.heard)return 'ch';return '';}

function renderStats(){
  document.getElementById('st-s').textContent=allBirds.filter(b=>obs[b.id]?.seen).length+' obs.';
  document.getElementById('st-h').textContent=allBirds.filter(b=>obs[b.id]?.heard).length+' entendus';
  document.getElementById('st-t').textContent=allBirds.length+' espèces';
}

async function renderGrid(){
  const list=filtered();const total=list.length;
  const maxP=Math.max(0,Math.ceil(total/PAGE)-1);
  if(page>maxP)page=0;
  const slice=list.slice(page*PAGE,(page+1)*PAGE);
  const grid=document.getElementById('grid');
  if(!slice.length){
    grid.innerHTML='<div class="empty"><i class="ti ti-binoculars" style="font-size:28px;display:block;margin:0 auto .5rem;opacity:.3"></i>Aucun oiseau trouvé</div>';
    document.getElementById('pager').style.display='none';renderStats();return;
  }
  grid.innerHTML=slice.map(b=>{
    const o=obs[b.id]||{};
    const badges=[];
    if(o.seen)badges.push('<span class="bdg s"><i class="ti ti-eye"></i> Vu</span>');
    if(o.heard)badges.push('<span class="bdg h"><i class="ti ti-ear"></i> Entendu</span>');
    return `<div class="card ${sc(b.id)}" data-id="${b.id}" role="button" tabindex="0" aria-label="${b.name}">
      <div class="cimg" id="img-${b.id}"><i class="ti ti-feather ph"></i></div>
      <div class="ci"><div class="cn">${b.name}</div><div class="cl">${b.latin}</div>${badges.length?'<div class="cbdg">'+badges.join('')+'</div>':''}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>openDetail(c.dataset.id));
    c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openDetail(c.dataset.id);});
  });
  const pager=document.getElementById('pager');
  if(total>PAGE){
    pager.style.display='flex';
    document.getElementById('pinfo').textContent=`Page ${page+1}/${maxP+1} — ${total} espèces`;
    document.getElementById('prev').disabled=page===0;
    document.getElementById('next').disabled=page===maxP;
  }else{pager.style.display='none';}
  renderStats();
  const loadBatch=async(birds)=>{
    for(const b of birds){
      const c=document.getElementById('img-'+b.id);if(!c)continue;
      const url=await getPhoto(b);
      const el=document.getElementById('img-'+b.id);
      if(url&&el){const img=document.createElement('img');img.src=url;img.alt=b.name;img.onload=()=>img.classList.add('loaded');el.innerHTML='';el.appendChild(img);}
    }
  };
  for(let i=0;i<slice.length;i+=8){loadBatch(slice.slice(i,i+8));await new Promise(r=>setTimeout(r,80));}
}

async function openDetail(id){
  const b=allBirds.find(x=>x.id===id);if(!b)return;
  const o=obs[id]||{};
  const panel=document.getElementById('dpanel');
  const url=await getPhoto(b);
  panel.innerHTML=`
    <div class="dimg">${url?`<img src="${url}" alt="${b.name}">`:'<i class="ti ti-feather dph"></i>'}</div>
    <div class="dbody">
      <div class="dhead">
        <div class="dtitle"><h3>${b.name}</h3><p>${b.latin}</p></div>
        <button class="closebtn" id="closebtn" aria-label="Fermer"><i class="ti ti-x"></i></button>
      </div>
      <div class="dtags">
        ${b.order?`<span class="tag">${b.order}</span>`:''}
        ${b.family?`<span class="tag">${b.family}</span>`:''}
      </div>
      <div class="obs">
        <div class="obstit">Mes observations</div>
        <div class="orow">
          <div class="och"><input type="checkbox" id="cb-s" ${o.seen?'checked':''}><label for="cb-s"><i class="ti ti-eye" style="color:#3B6D11"></i> Observé</label></div>
          <div class="ofields" id="sf" style="display:${o.seen?'grid':'none'}">
            <div><label>Date</label><input type="date" id="sd" value="${o.seenDate||''}"></div>
            <div><label>Lieu</label><input type="text" id="sp" placeholder="ex. Gorges du Tarn" value="${o.seenPlace||''}"></div>
          </div>
        </div>
        <div class="orow">
          <div class="och"><input type="checkbox" id="cb-h" ${o.heard?'checked':''}><label for="cb-h"><i class="ti ti-ear" style="color:#185FA5"></i> Entendu</label></div>
          <div class="ofields" id="hf" style="display:${o.heard?'grid':'none'}">
            <div><label>Date</label><input type="date" id="hd" value="${o.heardDate||''}"></div>
            <div><label>Lieu</label><input type="text" id="hp" placeholder="ex. Forêt de Mercoire" value="${o.heardPlace||''}"></div>
          </div>
        </div>
        <button class="savebtn" id="savebtn"><i class="ti ti-device-floppy"></i> Enregistrer</button>
        <div class="savedmsg" id="savedmsg"></div>
      </div>
      <a class="elink" href="https://www.inaturalist.org/taxa?q=${encodeURIComponent(b.latin)}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:11px;vertical-align:-1px"></i> Voir sur iNaturalist</a>
    </div>`;
  document.getElementById('overlay').style.display='flex';
  document.getElementById('closebtn').addEventListener('click',()=>document.getElementById('overlay').style.display='none');
  document.getElementById('cb-s').addEventListener('change',e=>document.getElementById('sf').style.display=e.target.checked?'grid':'none');
  document.getElementById('cb-h').addEventListener('change',e=>document.getElementById('hf').style.display=e.target.checked?'grid':'none');
  document.getElementById('savebtn').addEventListener('click',()=>{
    obs[id]={seen:document.getElementById('cb-s').checked,heard:document.getElementById('cb-h').checked,
      seenDate:document.getElementById('sd').value,seenPlace:document.getElementById('sp').value,
      heardDate:document.getElementById('hd').value,heardPlace:document.getElementById('hp').value};
    saveObs();renderGrid();
    const m=document.getElementById('savedmsg');
    if(m){m.textContent='Enregistré !';setTimeout(()=>{if(document.getElementById('savedmsg'))document.getElementById('savedmsg').textContent='';},2000);}
  });
}

// --- Export / Import ---
document.getElementById('btn-export').addEventListener('click',()=>{
  const data=JSON.stringify({version:1,exported:new Date().toISOString(),observations:obs},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='ornidex-observations-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('Observations exportées !');
});
document.getElementById('import-file').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.observations){
        obs={...obs,...data.observations};
        saveObs();renderGrid();
        toast('Observations importées !');
      }
    }catch(err){toast('Fichier invalide');}
  };
  reader.readAsText(file);
  e.target.value='';
});

// --- Événements UI ---
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))document.getElementById('overlay').style.display='none';});
document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.f;page=0;renderGrid();
  });
});
document.getElementById('search').addEventListener('input',e=>{q=e.target.value;page=0;renderGrid();});
document.getElementById('prev').addEventListener('click',()=>{page--;renderGrid();window.scrollTo(0,0);});
document.getElementById('next').addEventListener('click',()=>{page++;renderGrid();window.scrollTo(0,0);});

// --- PWA Install ---
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-bar').style.display='flex';
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==='accepted')toast('Ornidex installé !');
  deferredPrompt=null;
  document.getElementById('install-bar').style.display='none';
});
document.getElementById('close-bar').addEventListener('click',()=>{
  document.getElementById('install-bar').style.display='none';
});
window.addEventListener('appinstalled',()=>{ document.getElementById('install-bar').style.display='none'; toast('App installée avec succès !'); });

// --- Init ---
loadObs();
allBirds=BIRDS();
renderGrid();
</script>
